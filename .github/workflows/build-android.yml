name: Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  GODOT_VERSION: 4.6.2
  EXPORT_NAME: tile-explorer

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: |
          set -e
          sdkmanager --install "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Download Godot ${{ env.GODOT_VERSION }} (Linux headless)
        run: |
          set -e
          URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          wget -q "$URL"
          unzip -q "Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" godot
          chmod +x godot
          ./godot --version

      - name: Download Godot Android export templates
        run: |
          set -e
          URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          wget -q "$URL"
          TPL_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$TPL_DIR"
          unzip -q "Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          mv templates/* "$TPL_DIR/"
          ls "$TPL_DIR" | head -20

      - name: Restore (or generate) debug keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_BASE64 }}
        run: |
          set -e
          if [ -n "$KEYSTORE_B64" ]; then
            echo "Decoding stable keystore from ANDROID_DEBUG_KEYSTORE_BASE64 secret"
            echo -n "$KEYSTORE_B64" | base64 -d > "$GITHUB_WORKSPACE/debug.keystore"
          else
            echo "Secret not set — generating fresh ephemeral keystore (signature will change per build)"
            keytool -genkeypair -v \
              -keystore "$GITHUB_WORKSPACE/debug.keystore" \
              -alias androiddebugkey \
              -storepass android -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US" \
              -storetype PKCS12
          fi
          keytool -list -keystore "$GITHUB_WORKSPACE/debug.keystore" -storepass android | grep -E "fingerprint|Keystore type" | head -3

      - name: Configure Godot editor settings (SDK + keystore paths)
        run: |
          set -e
          CFG_DIR="$HOME/.config/godot"
          mkdir -p "$CFG_DIR"
          GODOT_MINOR=$(echo "$GODOT_VERSION" | cut -d. -f1-2)
          SETTINGS_FILE="$CFG_DIR/editor_settings-${GODOT_MINOR}.tres"
          cat > "$SETTINGS_FILE" <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/java_sdk_path = "$JAVA_HOME"
          export/android/android_sdk_path = "$ANDROID_HOME"
          export/android/debug_keystore = "$GITHUB_WORKSPACE/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF
          echo "Wrote $SETTINGS_FILE"
          cat "$SETTINGS_FILE"

      - name: Install Godot Gradle build template
        run: |
          set -e
          TPL_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p android/build
          unzip -q "$TPL_DIR/android_source.zip" -d android/build
          # Mark template as properly installed (mimics editor's "Install Build Template").
          # Godot reads android/.build_version for the gradle template version check;
          # android/build/version.txt is written for completeness. Content must be
          # "X.Y.Z.stable" — without the .official.<hash> suffix.
          touch android/build/.gdignore
          VERSION_STR="${GODOT_VERSION}.stable"
          echo -n "$VERSION_STR" > android/.build_version
          echo -n "$VERSION_STR" > android/build/version.txt
          echo "--- android/ contents ---"
          ls -la android/
          echo "--- .build_version ---"
          cat android/.build_version; echo
          echo "--- version.txt ---"
          cat android/build/version.txt; echo

      - name: Pre-import project resources
        run: |
          ./godot --headless --import . || true
          ./godot --headless --import .

      - name: Diagnostic dump
        run: |
          echo "--- ~/.config/godot listing ---"
          ls -la "$HOME/.config/godot/" || true
          echo "--- all editor_settings*.tres ---"
          for f in "$HOME/.config/godot/"editor_settings*.tres; do
            echo ">>> $f"; cat "$f" || true; echo
          done
          echo "--- keystore info ---"
          keytool -list -keystore "$GITHUB_WORKSPACE/debug.keystore" -storepass android || true
          echo "--- export templates dir ---"
          ls -la "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/" || true

      - name: Export Android debug APK
        run: |
          set -e
          ./godot --headless --verbose --export-debug "Android" "${EXPORT_NAME}.apk" 2>&1 | tee export.log
          ls -la "${EXPORT_NAME}.apk"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-apk
          path: ${{ env.EXPORT_NAME }}.apk
          retention-days: 30

      - name: Update rolling "latest" pre-release (main pushes)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build (rolling)
          prerelease: true
          body: |
            Auto-built APK from latest `main` commit (${{ github.sha }}).
            Sideload only — debug-signed, not for distribution.

            **Install on phone:** download `${{ env.EXPORT_NAME }}.apk`, open it,
            allow "Install from this source" if Android prompts. If reinstalling
            over a previous build with a different signature, uninstall first.
          files: ${{ env.EXPORT_NAME }}.apk
          fail_on_unmatched_files: true

      - name: Create tagged release (vX.Y.Z tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            Release ${{ github.ref_name }}.
            Sideload only — debug-signed, not for distribution.
          files: ${{ env.EXPORT_NAME }}.apk
          fail_on_unmatched_files: true
